<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kru Academy - Property Management Resource Center</title>
  <meta name="description" content="Master property management with Kru Academy. Free and premium courses, certifications, and expert-led training powered by Kru.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#3C595D;--primary-light:#64A5AD;--primary-dark:#233538;
      --accent:#246AFD;--bg:#FFFFFF;--bg-white:#FFFFFF;--bg-section:#F7F8FA;
      --dark:#0D0F0F;--dark-2:#1B1B1B;--dark-3:#2A2D2E;
      --text-dark:#1B1B1B;--text-mid:#6A8A8F;--text-light:#C8C8C8;
      --border:#E2E8F0;--success:#22C55E;--warning:#F59E0B;--danger:#EF4444;
      --radius:12px;--radius-sm:8px;--radius-full:9999px;
      --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.03);
      --shadow-lg:0 4px 24px rgba(0,0,0,0.10);--tr:all .2s ease;
    }
    body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text-dark);line-height:1.6;min-height:100vh}
    a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
    button{font-family:'Jost',sans-serif;cursor:pointer;border:none;outline:none;transition:var(--tr)}
    input,textarea,select{font-family:'Jost',sans-serif;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:15px;width:100%;transition:var(--tr);background:var(--bg-white)}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(60,89,93,0.1)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:var(--radius-full);font-weight:700;font-size:15px;transition:var(--tr);letter-spacing:.01em}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:var(--shadow)}
    .btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#1a5ae0;transform:translateY(-1px)}
    .btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}.btn-outline:hover{background:var(--primary);color:#fff}
    .btn-dark{background:var(--dark-2);color:#fff}.btn-dark:hover{background:var(--dark);transform:translateY(-1px)}
    .btn-white{background:#fff;color:var(--dark-2)}.btn-white:hover{background:#f0f0f0;transform:translateY(-1px)}
    .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
    .btn-success{background:var(--success);color:#fff}
    .btn-sm{padding:8px 18px;font-size:13px}.btn-lg{padding:16px 36px;font-size:17px}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* NAVBAR */
    .navbar{background:var(--dark);padding:0 40px;height:72px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
    .nav-logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;color:#fff;cursor:pointer}
    .nav-logo .logo-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px}
    .nav-logo em{color:var(--primary-light);font-weight:400;font-style:normal}
    .nav-links{display:flex;align-items:center;gap:2px}
    .nav-link{padding:8px 18px;border-radius:var(--radius-full);color:rgba(255,255,255,0.75);font-weight:500;font-size:15px;cursor:pointer;transition:var(--tr);background:none}
    .nav-link:hover,.nav-link.active{background:rgba(255,255,255,0.08);color:#fff}
    .nav-right{display:flex;align-items:center;gap:12px}
    .notif-btn{position:relative;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:#fff}
    .notif-btn:hover{background:rgba(255,255,255,0.14)}
    .notif-badge{position:absolute;top:2px;right:2px;width:18px;height:18px;background:var(--danger);color:#fff;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
    .user-avatar{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer}
    .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg-white);border-radius:var(--radius);box-shadow:var(--shadow-lg);min-width:200px;padding:8px;display:none;z-index:100}
    .user-dropdown.show{display:block}
    .user-dropdown button{width:100%;padding:10px 16px;text-align:left;background:none;border:none;border-radius:var(--radius-sm);font-size:14px;color:var(--text-dark);display:flex;align-items:center;gap:10px}
    .user-dropdown button:hover{background:var(--bg-section)}
    .mobile-toggle{display:none;background:none;border:none;font-size:24px;cursor:pointer;color:#fff}
    @media(max-width:768px){.navbar{padding:0 16px}.nav-links{display:none;position:absolute;top:72px;left:0;right:0;background:var(--dark);flex-direction:column;padding:16px;border-bottom:1px solid rgba(255,255,255,0.1)}.nav-links.show{display:flex}.mobile-toggle{display:block}}

    /* LAYOUT */
    .container{max-width:1200px;margin:0 auto;padding:40px 24px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
    @media(max-width:1024px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

    /* SECTION */
    .section-white{background:#fff;padding:80px 0}
    .section-light{background:var(--bg-section);padding:80px 0}
    .section-dark{background:var(--dark);padding:80px 0;color:#fff}
    .section-title{font-size:36px;font-weight:800;margin-bottom:12px;letter-spacing:-.02em}
    .section-subtitle{color:var(--text-mid);font-size:17px;max-width:600px;margin:0 auto;line-height:1.6}
    .section-dark .section-subtitle{color:rgba(255,255,255,0.65)}

    /* CARD */
    .card{background:var(--bg-white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:var(--tr)}
    .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:transparent}.card-body{padding:24px}

    /* HERO */
    .hero{background:var(--dark);color:#fff;padding:100px 24px 80px;text-align:center;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:-40%;right:-15%;width:700px;height:700px;background:radial-gradient(circle,rgba(60,89,93,0.25) 0%,transparent 70%);border-radius:50%}
    .hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(100,165,173,0.12) 0%,transparent 70%);border-radius:50%}
    .hero h1{font-size:52px;font-weight:800;margin-bottom:20px;position:relative;z-index:1;letter-spacing:-.03em;line-height:1.1}
    .hero h1 em{color:var(--primary-light);font-style:normal}
    .hero p{font-size:19px;opacity:.7;max-width:620px;margin:0 auto 36px;position:relative;z-index:1;font-weight:400;line-height:1.6}
    .hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
    @media(max-width:640px){.hero h1{font-size:34px}.hero p{font-size:16px}}

    /* COURSE CARDS */
    .course-thumb{height:180px;background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(255,255,255,0.15);position:relative}
    .badge{padding:4px 12px;border-radius:var(--radius-full);font-size:12px;font-weight:600;color:#fff;display:inline-block}
    .badge-free{background:var(--success)}.badge-paid{background:var(--accent)}
    .badge-beginner{background:var(--success)}.badge-intermediate{background:var(--warning)}.badge-advanced{background:var(--danger)}
    .course-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-mid);margin-top:12px}
    .course-meta span{display:flex;align-items:center;gap:4px}
    .price{font-size:22px;font-weight:700;color:var(--primary)}.price.free{color:var(--success)}

    /* PROGRESS */
    .progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}
    .progress-bar .fill{height:100%;background:var(--primary);border-radius:4px;transition:width .5s ease}
    .progress-text{font-size:13px;color:var(--text-mid);font-weight:500}

    /* COURSE VIEW */
    .course-layout{display:grid;grid-template-columns:340px 1fr;gap:0;min-height:calc(100vh - 70px)}
    @media(max-width:1024px){.course-layout{grid-template-columns:1fr}}
    .course-sidebar{background:var(--bg-white);border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 70px);position:sticky;top:70px}
    @media(max-width:1024px){.course-sidebar{position:static;max-height:none}}
    .sidebar-header{padding:24px;border-bottom:1px solid var(--border)}
    .module-group{border-bottom:1px solid var(--border)}
    .module-title{padding:16px 24px;font-weight:600;font-size:14px;color:var(--primary-dark);background:var(--bg-section);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
    .module-title:hover{background:#eef2f3}
    .lesson-item{padding:12px 24px 12px 40px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:var(--tr);border-left:3px solid transparent}
    .lesson-item:hover{background:var(--bg-section)}
    .lesson-item.active{background:rgba(60,89,93,0.06);border-left-color:var(--primary);color:var(--primary);font-weight:600}
    .lesson-item.completed{color:var(--success)}
    .check-icon{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
    .lesson-item.completed .check-icon{background:var(--success);border-color:var(--success);color:#fff}
    .duration{margin-left:auto;font-size:12px;color:var(--text-light)}
    .course-content{padding:32px;overflow-y:auto}
    @media(max-width:640px){.course-content{padding:16px}}
    .video-container{position:relative;width:100%;padding-bottom:56.25%;background:#000;border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
    .video-container iframe,.video-container video{position:absolute;top:0;left:0;width:100%;height:100%}
    .social-embed{padding:40px;text-align:center;background:var(--dark);border-radius:var(--radius);color:#fff;margin-bottom:24px}
    .social-embed a{color:#fff;font-size:18px;font-weight:600}
    .lesson-content-text{background:var(--bg-white);border-radius:var(--radius);padding:32px;margin-bottom:24px;line-height:1.8;box-shadow:var(--shadow)}
    .lesson-content-text h3{color:var(--primary-dark);margin-bottom:16px}
    .lesson-content-text ul,.lesson-content-text ol{padding-left:24px;margin:12px 0}
    .lesson-content-text li{margin:8px 0}

    /* QUIZ */
    .quiz-header{background:var(--dark);color:#fff;padding:32px;border-radius:var(--radius) var(--radius) 0 0}
    .quiz-body{background:var(--bg-white);padding:32px;border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow)}
    .q-number{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--primary);color:#fff;border-radius:50%;font-size:14px;font-weight:600;margin-right:12px;flex-shrink:0}
    .q-text{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:flex-start}
    .answer-option{display:flex;align-items:center;gap:12px;padding:14px 18px;border:2px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:var(--tr);font-size:15px}
    .answer-option:hover{border-color:var(--primary-light);background:rgba(60,89,93,0.03)}
    .answer-option.selected{border-color:var(--primary);background:rgba(60,89,93,0.06)}
    .answer-option.correct{border-color:var(--success);background:rgba(34,197,94,0.08)}
    .answer-option.incorrect{border-color:var(--danger);background:rgba(239,68,68,0.08)}
    .answer-radio{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .answer-option.selected .answer-radio{border-color:var(--primary)}
    .answer-option.selected .answer-radio::after{content:'';width:10px;height:10px;background:var(--primary);border-radius:50%}
    .answer-checkbox{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
    .answer-option.selected .answer-checkbox{border-color:var(--primary);background:var(--primary);color:#fff}
    .explanation{padding:12px 16px;background:#F0F9FF;border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:8px;font-size:14px;color:#0369A1}

    /* RESULTS */
    .results-score{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:42px;font-weight:800}
    .results-score.passed{background:rgba(34,197,94,0.1);color:var(--success);border:4px solid var(--success)}
    .results-score.failed{background:rgba(239,68,68,0.1);color:var(--danger);border:4px solid var(--danger)}

    /* CERTIFICATE */
    .cert-card{background:#fff;border:3px solid var(--primary);border-radius:var(--radius);padding:48px;text-align:center;position:relative;max-width:700px;margin:0 auto}
    .cert-card::before{content:'';position:absolute;inset:8px;border:1px solid var(--primary-light);border-radius:var(--radius-sm);pointer-events:none}

    /* NOTIFICATIONS */
    .notif-panel{position:fixed;top:72px;right:0;width:380px;max-height:calc(100vh - 72px);background:var(--bg-white);box-shadow:var(--shadow-lg);z-index:999;overflow-y:auto;border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s ease}
    .notif-panel.show{transform:translateX(0)}
    .notif-panel-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-white)}
    .notif-item{padding:16px 24px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--tr)}
    .notif-item:hover{background:var(--bg-section)}
    .notif-item.unread{background:rgba(36,106,253,0.04);border-left:3px solid var(--accent)}
    .notif-item .notif-title{font-weight:600;font-size:14px;margin-bottom:4px}
    .notif-item .notif-msg{font-size:13px;color:var(--text-mid);line-height:1.4}
    .notif-item .notif-time{font-size:11px;color:var(--text-light);margin-top:6px}

    /* NOTES */
    .note-card{background:var(--bg-white);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;border-left:3px solid var(--primary);border:1px solid var(--border);border-left:3px solid var(--primary)}

    /* AUTH */
    .auth-page{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;padding:40px 24px;background:var(--dark)}
    .auth-card{background:var(--bg-white);border-radius:var(--radius);padding:48px 40px;max-width:480px;width:100%;box-shadow:var(--shadow-lg)}
    .auth-card h2{font-size:28px;margin-bottom:8px;color:var(--primary-dark)}
    .auth-sub{color:var(--text-mid);margin-bottom:32px;font-size:15px}
    .auth-divider{text-align:center;color:var(--text-light);font-size:13px;margin:20px 0}

    /* FORMS */
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-weight:600;font-size:14px;margin-bottom:6px;color:var(--text-dark)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:480px){.form-row{grid-template-columns:1fr}}

    /* STAT CARDS */
    .stat-card{background:var(--bg-white);border-radius:var(--radius);padding:24px;border:1px solid var(--border)}
    .stat-value{font-size:32px;font-weight:800;color:var(--primary-dark)}
    .stat-label{font-size:14px;color:var(--text-mid);margin-top:4px}

    /* TABLES */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:12px 16px;background:var(--bg-section);font-size:13px;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px}
    td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
    tr:hover td{background:rgba(60,89,93,0.02)}

    /* TABS */
    .tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:24px;overflow-x:auto}
    .tab{padding:12px 20px;font-weight:500;font-size:14px;color:var(--text-mid);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
    .tab:hover{color:var(--primary)}.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

    /* TOGGLE */
    .toggle{position:relative;display:inline-block;width:48px;height:26px}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:26px;transition:var(--tr)}
    .toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:var(--tr)}
    .toggle input:checked+.toggle-slider{background:var(--primary)}
    .toggle input:checked+.toggle-slider::before{transform:translateX(22px)}

    /* PAYMENT */
    .payment-summary{background:var(--bg-section);border-radius:var(--radius-sm);padding:20px;margin-bottom:24px}
    .payment-total{font-size:28px;font-weight:800;color:var(--primary)}

    /* TOAST */
    .toast-container{position:fixed;top:80px;right:24px;z-index:3000;display:flex;flex-direction:column;gap:8px}
    .toast{padding:14px 24px;border-radius:var(--radius-sm);color:#fff;font-weight:500;font-size:14px;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;max-width:360px}
    .toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.info{background:var(--accent)}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

    /* FOOTER */
    .footer{background:var(--dark);color:#fff;padding:60px 24px 24px;margin-top:0;border-top:1px solid rgba(255,255,255,0.06)}
    .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;max-width:1200px;margin:0 auto}
    @media(max-width:768px){.footer-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:480px){.footer-grid{grid-template-columns:1fr}}
    .footer h4{font-size:16px;margin-bottom:16px}
    .footer p,.footer a{font-size:14px;color:rgba(255,255,255,0.7)}.footer a:hover{color:#fff;text-decoration:none}
    .footer-links{list-style:none}.footer-links li{margin-bottom:8px}
    .footer-bottom{text-align:center;padding-top:32px;margin-top:32px;border-top:1px solid rgba(255,255,255,0.1);font-size:13px;color:rgba(255,255,255,0.5);max-width:1200px;margin-left:auto;margin-right:auto}

    .loading{display:flex;align-items:center;justify-content:center;padding:60px}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:60px 24px;color:var(--text-mid)}
    .empty-state h3{font-size:20px;color:var(--text-dark);margin-bottom:8px}

    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text-light);border-radius:3px}
    [hidden]{display:none!important}

    /* CHATBOT */
    .chatbot-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .chatbot{background:var(--bg-white);border-radius:var(--radius);max-width:520px;width:100%;box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp .4s ease}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    .chatbot-header{background:var(--dark);color:#fff;padding:28px 32px;position:relative}
    .chatbot-header h3{font-size:20px;margin-bottom:4px}.chatbot-header p{font-size:14px;opacity:.85}
    .chatbot-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
    .chatbot-close:hover{background:rgba(255,255,255,.3)}
    .chatbot-body{padding:28px 32px}
    .chatbot-step{animation:fadeIn .3s ease}
    .chatbot-q{font-size:16px;font-weight:600;color:var(--primary-dark);margin-bottom:20px;line-height:1.5}
    .chatbot-option{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border:2px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;cursor:pointer;transition:var(--tr)}
    .chatbot-option:hover{border-color:var(--primary-light);background:rgba(60,89,93,.03);transform:translateX(4px)}
    .chatbot-option .cb-icon{font-size:28px;flex-shrink:0;margin-top:2px}

  _get(k){ try{ return JSON.parse(localStorage.getItem('kru_'+k)) || null; }catch{ return null; } },
  _set(k,v){ localStorage.setItem('kru_'+k, JSON.stringify(v)); },
  getAll(k){ return this._get(k) || []; },
  setAll(k,v){ this._set(k,v); },
  nextId(k){ const n = (this._get(k+'_seq') || 0) + 1; this._set(k+'_seq', n); return n; },
  insert(k, obj){ const all = this.getAll(k); obj.id = this.nextId(k); all.push(obj); this.setAll(k, all); return obj; },
  update(k, id, patch){ const all = this.getAll(k); const i = all.findIndex(x=>x.id===id); if(i>=0) Object.assign(all[i], patch); this.setAll(k, all); return all[i]; },
  remove(k, id){ this.setAll(k, this.getAll(k).filter(x=>x.id!==id)); },
  find(k, fn){ return this.getAll(k).find(fn); },
  filter(k, fn){ return this.getAll(k).filter(fn); },
  count(k, fn){ return fn ? this.filter(k,fn).length : this.getAll(k).length; }
};

  DB.insert('resources', { title:'Understanding the Residential Tenancies Act', description:'A beginner-friendly breakdown of your rights and responsibilities as a landlord under Canadian tenancy law.', type:'guide', content:'<h3>Know Your Legal Obligations</h3><p>Every province in Canada has its own Residential Tenancies Act (RTA) governing the landlord-tenant relationship. While the specifics vary, the core principles are consistent:</p><ul><li><strong>Right to Quiet Enjoyment</strong> — Tenants have the right to reasonable peace in their home. You cannot enter without proper notice (usually 24 hours).</li><li><strong>Maintenance Standards</strong> — Landlords must keep the property in a good state of repair, meeting all health, safety, and housing standards.</li><li><strong>Rent Increases</strong> — Most provinces cap annual rent increases and require written notice (typically 90 days).</li><li><strong>Security Deposits</strong> — Rules around deposits vary by province. Some provinces do not allow them at all.</li><li><strong>Eviction Process</strong> — You cannot simply evict a tenant. There are specific legal grounds and procedures that must be followed.</li></ul><p>Staying informed about your local RTA is essential. Ignorance of the law is not a defense.</p>', category:'all', tags:'legal,beginner', created_at:new Date().toISOString() });
  DB.insert('resources', { title:'How Kru Saves Property Managers 10+ Hours/Week', description:'See how the Kru platform automates maintenance coordination, contractor dispatch, and tenant communication — so you can focus on growing your portfolio.', type:'video', url:'https://www.youtube.com/watch?v=dQw4w9WgXcQ', category:'all', tags:'kru,platform', created_at:new Date().toISOString() });
  DB.insert('resources', { title:'The PM Playbook: From 1 Unit to 50', description:'Real strategies from property managers who scaled their portfolio. Covers systems, hiring, technology, and mindset shifts at every stage of growth.', type:'blog', content:'<h3>Scaling Your Portfolio</h3><p>Growing from a single rental unit to a portfolio of 50+ properties requires fundamentally different systems at each stage. Here is what changes:</p><h3>1-5 Units: The DIY Phase</h3><p>You can handle most things yourself at this stage. Focus on learning the basics of tenant relations, light maintenance, and bookkeeping. Use spreadsheets and your phone.</p><h3>5-15 Units: The Systems Phase</h3><p>This is where most landlords get stuck. You need to transition from doing everything yourself to building repeatable processes. Use property management software, standardize your lease agreements, and start building a contractor network.</p><h3>15-50 Units: The Team Phase</h3><p>You cannot do this alone. Consider hiring a part-time property manager or virtual assistant. Use platforms like Kru to automate maintenance workflows. Delegate tenant communication and focus on acquisitions and strategy.</p>', category:'all', tags:'scaling,strategy', created_at:new Date().toISOString() });
  DB.insert('resources', { title:'Setting Up Your First Rental Property', description:'A complete walkthrough for first-time landlords — from finding the right property to getting your first tenant moved in.', type:'guide', content:'<h3>Your First Rental Property Checklist</h3><ol><li><strong>Research your market</strong> — Understand average rents, vacancy rates, and tenant demographics in your area.</li><li><strong>Run the numbers</strong> — Calculate mortgage, taxes, insurance, maintenance reserves (budget 1-2% of property value annually), and expected rental income.</li><li><strong>Prepare the property</strong> — Ensure it meets all safety codes. Install smoke detectors, carbon monoxide detectors, and secure all entry points.</li><li><strong>Get insured</strong> — Switch from homeowner to landlord insurance. Consider an umbrella policy for extra liability protection.</li><li><strong>Create a lease agreement</strong> — Use a province-specific template. Cover rent amount, due date, pet policy, maintenance responsibilities, and notice requirements.</li><li><strong>List and market</strong> — Use online platforms, social media, and local signage. Take quality photos and write detailed descriptions.</li><li><strong>Screen tenants thoroughly</strong> — Never skip this step. See our tenant screening guide for details.</li><li><strong>Document everything</strong> — Do a move-in inspection with photos and have the tenant sign off.</li></ol>', category:'all', tags:'beginner,setup', created_at:new Date().toISOString() });

// ================================================================
//  APP STATE & CONTROLLER
// ================================================================
const App = {
  state: {
    user: JSON.parse(localStorage.getItem('kru_current_user') || 'null'),
    page: 'home',
    courses: [],
    currentCourse: null,
    currentLesson: null,
    currentQuiz: null,
    quizAnswers: {},
    quizResults: null,
    courseProgress: null,
    showNotifPanel: false,
    showUserMenu: false,
    mobileNav: false,
    quizTimerId: null,
    quizTimeLeft: 0,
    adminTab: 'courses',
    resourceFilter: 'all',
    currentResource: null,
    showChatbot: false,
    chatbotStep: 0,
    chatbotProfile: null,
  },

  // Helpers
  esc(s){ if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; },
  timeAgo(d){ const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago'; if(s<86400) return Math.floor(s/3600)+'h ago'; if(s<604800) return Math.floor(s/86400)+'d ago'; return new Date(d).toLocaleDateString(); },
  toast(msg, type='info'){ const c=document.getElementById('toasts'), t=document.createElement('div'); t.className='toast '+type; t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),4000); },

  go(page, extra={}){
    if(this.state.quizTimerId){ clearInterval(this.state.quizTimerId); this.state.quizTimerId=null; }
    Object.assign(this.state, { page, showNotifPanel:false, showUserMenu:false, mobileNav:false, ...extra });
    window.scrollTo(0,0);
    this.render();
  },

  // Auth
  login(email, pw){
    const u = DB.find('users', x=>x.email===email && x.password===pw);
    if(!u) return this.toast('Invalid email or password','error');
    DB.update('users', u.id, { last_active: new Date().toISOString() });
    this.state.user = u;
    localStorage.setItem('kru_current_user', JSON.stringify(u));
    this.toast('Welcome back, '+u.first_name+'!','success');
    this.go(u.role==='admin'?'admin':'dashboard');
  },
  register(data){
    if(!data.first_name||!data.last_name||!data.email||!data.password) return this.toast('All fields required','error');
    if(DB.find('users', x=>x.email===data.email)) return this.toast('Email already registered','error');
    const u = DB.insert('users', { ...data, role:'student', email_notif:true, sms_notif:true, push_notif:true, created_at:new Date().toISOString(), last_active:new Date().toISOString() });
    DB.insert('notifications', { user_id:u.id, title:'Welcome to Kru Academy!', message:'Start exploring our courses to build your property management skills.', type:'info', is_read:false, created_at:new Date().toISOString() });
    this.state.user = u;
    localStorage.setItem('kru_current_user', JSON.stringify(u));
    this.toast('Welcome to Kru Academy, '+u.first_name+'!','success');
    this.go('dashboard');
  },
  logout(){ this.state.user=null; localStorage.removeItem('kru_current_user'); this.go('home'); },
  updateProfile(d){
    const u = DB.update('users', this.state.user.id, d);
    this.state.user = u;
    localStorage.setItem('kru_current_user', JSON.stringify(u));
    this.toast('Profile updated!','success');
    this.render();
  },

  // Courses
  getCourses(){ return DB.filter('courses', c=>c.is_published); },
  getCourse(id){ return DB.find('courses', c=>c.id===id); },
  getModules(courseId){ return DB.filter('modules', m=>m.course_id===courseId).sort((a,b)=>a.sort_order-b.sort_order); },
  getLessons(moduleId){ return DB.filter('lessons', l=>l.module_id===moduleId).sort((a,b)=>a.sort_order-b.sort_order); },
  getQuizzes(courseId){ return DB.filter('quizzes', q=>q.course_id===courseId); },
  getQuestions(quizId){ return DB.filter('questions', q=>q.quiz_id===quizId).sort((a,b)=>a.sort_order-b.sort_order); },
  getAnswers(qId){ return DB.filter('answers', a=>a.question_id===qId).sort((a,b)=>a.sort_order-b.sort_order); },

  // Enrollment
  isEnrolled(courseId){ return !!DB.find('enrollments', e=>e.user_id===this.state.user?.id && e.course_id===courseId); },
  enroll(courseId){
    if(!this.state.user) return this.go('register');
    const c = this.getCourse(courseId);
    if(this.isEnrolled(courseId)) return this.toast('Already enrolled','error');
    DB.insert('enrollments', { user_id:this.state.user.id, course_id:courseId, payment_status:c.is_free?'free':'pending', payment_amount:c.price, enrolled_at:new Date().toISOString(), completed_at:null });
    DB.insert('notifications', { user_id:this.state.user.id, title:'Enrolled Successfully!', message:'You are now enrolled in "'+c.title+'". Start learning today!', type:'achievement', is_read:false, created_at:new Date().toISOString() });
    if(!c.is_free){ this.go('payment', { paymentCourse:c }); }
    else{ this.toast('Enrolled successfully!','success'); this.render(); }
  },
  pay(courseId){
    DB.update('enrollments', DB.find('enrollments', e=>e.user_id===this.state.user.id && e.course_id===courseId).id, { payment_status:'paid', payment_date:new Date().toISOString() });
    this.toast('Payment successful!','success');
    this.state.currentCourse = this.getCourse(courseId);
    this.go('course-view', { currentLesson:null });
  },

  // Progress
  getProgress(courseId){
    const uid = this.state.user?.id;
    if(!uid) return null;
    const modules = this.getModules(courseId);
    let totalLessons = 0, completedLessons = 0, lessonProgress = {};
    modules.forEach(m=>{ this.getLessons(m.id).forEach(l=>{ totalLessons++; const p=DB.find('lesson_progress', x=>x.user_id===uid&&x.lesson_id===l.id&&x.completed); if(p){ completedLessons++; lessonProgress[l.id]=true; } }); });
    return { totalLessons, completedLessons, progress: totalLessons>0?Math.round(completedLessons/totalLessons*100):0, lessonProgress };
  },
  completeLesson(lessonId){
    const existing = DB.find('lesson_progress', x=>x.user_id===this.state.user.id&&x.lesson_id===lessonId);
    if(existing) DB.update('lesson_progress', existing.id, { completed:true, completed_at:new Date().toISOString() });
    else DB.insert('lesson_progress', { user_id:this.state.user.id, lesson_id:lessonId, completed:true, completed_at:new Date().toISOString() });
    this.toast('Lesson completed!','success');
    this.render();
  },

  // Quiz
  startQuiz(quizId){
    const quiz = DB.find('quizzes', q=>q.id===quizId);
    const attempts = DB.count('quiz_attempts', a=>a.user_id===this.state.user.id&&a.quiz_id===quizId);
    this.state.currentQuiz = quiz;
    this.state.currentQuiz._attempts = attempts;
    this.state.quizAnswers = {};
    this.state.quizResults = null;
    if(quiz.time_limit > 0){
      this.state.quizTimeLeft = quiz.time_limit * 60;
      this.state.quizTimerId = setInterval(()=>{
        this.state.quizTimeLeft--;
        const el = document.getElementById('quiz-timer');
        if(el) el.textContent = Math.floor(this.state.quizTimeLeft/60)+':'+String(this.state.quizTimeLeft%60).padStart(2,'0');
        if(this.state.quizTimeLeft<=0) this.submitQuiz();
      }, 1000);
    }
    this.go('quiz');
  },
  selectAnswer(qId, aId, multi){
    if(multi){
      if(!this.state.quizAnswers[qId]) this.state.quizAnswers[qId]=[];
      const idx=this.state.quizAnswers[qId].indexOf(aId);
      if(idx>-1) this.state.quizAnswers[qId].splice(idx,1); else this.state.quizAnswers[qId].push(aId);
    } else { this.state.quizAnswers[qId]=[aId]; }
    this.render();
  },
  submitQuiz(){
    if(this.state.quizTimerId){ clearInterval(this.state.quizTimerId); this.state.quizTimerId=null; }
    const quiz = this.state.currentQuiz;
    const questions = this.getQuestions(quiz.id);
    let totalPts=0, earnedPts=0, results=[];
    questions.forEach(q=>{
      totalPts+=q.points;
      const correct = DB.filter('answers', a=>a.question_id===q.id&&a.is_correct).map(a=>a.id);
      const user = this.state.quizAnswers[q.id]||[];
      const ok = correct.length===user.length && correct.every(a=>user.includes(a));
      if(ok) earnedPts+=q.points;
      results.push({ questionId:q.id, correct:ok, correctAnswers:correct, userAnswers:user, explanation:q.explanation });
    });
    const score = totalPts>0?Math.round(earnedPts/totalPts*100):0;
    const passed = score>=quiz.passing_score;
    DB.insert('quiz_attempts', { user_id:this.state.user.id, quiz_id:quiz.id, score, passed, created_at:new Date().toISOString() });

    if(quiz.quiz_type==='final_exam' && passed){
      if(!DB.find('certificates', c=>c.user_id===this.state.user.id&&c.course_id===quiz.course_id)){
        const certNum = 'KRU-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substr(2,4).toUpperCase();
        DB.insert('certificates', { user_id:this.state.user.id, course_id:quiz.course_id, certificate_number:certNum, issued_at:new Date().toISOString() });
        const enr = DB.find('enrollments', e=>e.user_id===this.state.user.id&&e.course_id===quiz.course_id);
        if(enr) DB.update('enrollments', enr.id, { completed_at:new Date().toISOString() });
        DB.insert('notifications', { user_id:this.state.user.id, title:'Congratulations! Certificate Earned!', message:'You earned your Kru Academy Certificate! #'+certNum, type:'achievement', is_read:false, created_at:new Date().toISOString() });
      }
    }
    this.state.quizResults = { score, passed, totalPts, earnedPts, results, passing_score:quiz.passing_score };
    this.render();
  },

  // Notes
  saveNote(content, lessonId, courseId){
    if(!content.trim()) return;
    DB.insert('notes', { user_id:this.state.user.id, lesson_id:lessonId, course_id:courseId, content, created_at:new Date().toISOString() });
    this.toast('Note saved!','success');
    this.render();
  },
  deleteNote(id){ DB.remove('notes', id); this.render(); },
  getNotes(){ return DB.filter('notes', n=>n.user_id===this.state.user?.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)); },

  // Notifications
  getNotifications(){
    return DB.filter('notifications', n=>n.user_id===this.state.user?.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  },
  unreadCount(){ return DB.count('notifications', n=>n.user_id===this.state.user?.id&&!n.is_read); },
  markAllRead(){ DB.filter('notifications', n=>n.user_id===this.state.user?.id&&!n.is_read).forEach(n=>DB.update('notifications', n.id, { is_read:true })); this.render(); },
  markRead(id){ DB.update('notifications', id, { is_read:true }); this.render(); },

  // Certificates
  getCertificates(){ return DB.filter('certificates', c=>c.user_id===this.state.user?.id).sort((a,b)=>new Date(b.issued_at)-new Date(a.issued_at)); },

  // Admin
  adminCreateCourse(d){ DB.insert('courses', { ...d, is_published:false, created_by:this.state.user.id, created_at:new Date().toISOString() }); this.toast('Course created!','success'); this.render(); },
  adminCreateModule(d){ DB.insert('modules', { ...d, sort_order:d.sort_order||0 }); this.toast('Module created!','success'); this.render(); },
  adminCreateLesson(d){ DB.insert('lessons', { ...d, sort_order:d.sort_order||0 }); this.toast('Lesson added!','success'); this.render(); },
  adminCreateQuiz(d){ DB.insert('quizzes', d); this.toast('Quiz created!','success'); this.render(); },
  adminCreateQuestion(d){
    const q = DB.insert('questions', { quiz_id:d.quiz_id, text:d.text, type:d.type, explanation:d.explanation, points:d.points||1, sort_order:d.sort_order||0 });
    (d.answers||[]).forEach((a,i)=>DB.insert('answers', { question_id:q.id, text:a.text, is_correct:a.correct, sort_order:i }));
    this.toast('Question added!','success'); this.render();
  },
  adminTogglePublish(id){
    const c = this.getCourse(id);
    DB.update('courses', id, { is_published:!c.is_published });
    this.toast(c.is_published?'Unpublished':'Published','success');
    this.render();
  },
  adminSendReminder(userId){
    DB.insert('notifications', { user_id:userId, title:'We Miss You!', message:'It has been a while since your last visit. Your courses are waiting for you!', type:'reminder', is_read:false, created_at:new Date().toISOString() });
    this.toast('Reminder sent!','success');
  },
  adminSendBulk(){
    const week = Date.now()-7*86400000;
    let sent=0;
    DB.filter('users', u=>u.role==='student'&&new Date(u.last_active)<week).forEach(u=>{
      DB.insert('notifications', { user_id:u.id, title:'We Miss You!', message:'Come back and continue your learning journey at Kru Academy!', type:'reminder', is_read:false, created_at:new Date().toISOString() });
      sent++;
    });
    this.toast(`Sent ${sent} reminders`,'success');
  },

  // YouTube ID extractor
  ytId(url){ const m=(url||'').match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&\n?#]+)/); return m?m[1]:''; },

  //  RENDER
  // ================================================================
  render(){
    const $ = document.getElementById('app');
    let h = this.renderNav();
    switch(this.state.page){
      case 'home': h+=this.renderHome(); break;
      case 'get-started': h+=this.renderGetStarted(); break;
      case 'resources': h+=this.renderResources(); break;
      case 'resource-detail': h+=this.renderResourceDetail(); break;
      case 'courses': h+=this.renderCourses(); break;
      case 'course-detail': h+=this.renderCourseDetail(); break;
      case 'course-view': h+=this.renderCourseView(); break;
      case 'quiz': h+=this.renderQuizPage(); break;
      case 'login': h+=this.renderLogin(); break;
      case 'register': h+=this.renderRegister(); break;
      case 'dashboard': h+=this.renderDashboard(); break;
      case 'my-courses': h+=this.renderMyCourses(); break;
      case 'certificates': h+=this.renderCertificatesPage(); break;
      case 'notes': h+=this.renderNotesPage(); break;
      case 'profile': h+=this.renderProfile(); break;
      case 'payment': h+=this.renderPayment(); break;
      case 'admin': h+=this.renderAdmin(); break;
      default: h+=this.renderHome();
    }
    if(!['course-view','quiz'].includes(this.state.page)) h+=this.renderFooter();
    h+=this.renderNotifPanel();
    if(this.state.showChatbot) h+=this.renderChatbot();
    $.innerHTML = h;

            <div class="progress-bar" style="background:rgba(255,255,255,.2)"><div class="fill" style="width:${prog.progress}%"></div></div>
          </div>
          <button class="btn btn-accent btn-lg" onclick="App.state.currentLesson=null;App.go('course-view')">Continue Learning</button>`
        :`<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
          <span style="font-size:28px;font-weight:800">${c.is_free?'Free':'$'+c.price.toFixed(2)}</span>

            <div class="module-title" style="padding:20px 24px"><span>Module ${i+1}: ${this.esc(m.title)}</span><span style="font-size:13px;color:var(--text-mid)">${lessons.length} lessons</span></div>

          </div>`;
        }).join('')}

          <div style="padding:20px 24px;display:flex;align-items:center;gap:12px">
            <span style="font-size:24px">&#127942;</span><div><strong>${this.esc(q.title)}</strong>
            <div style="font-size:13px;color:var(--text-mid)">${this.esc(q.description)} | Passing: ${q.passing_score}%${q.time_limit?' | '+q.time_limit+' min':''}</div></div>
          </div></div>`).join('')}

  // COURSE VIEW (learning)
  renderCourseView(){
    const c=this.state.currentCourse; if(!c) return '';
    const modules = this.getModules(c.id);
    const prog = this.getProgress(c.id);
    const quizzes = this.getQuizzes(c.id);
    let lesson = this.state.currentLesson;
    if(!lesson && modules.length){ const lessons=this.getLessons(modules[0].id); if(lessons.length) lesson=lessons[0]; }

    return `<div class="course-layout">
      <div class="course-sidebar">
        <div class="sidebar-header">
          <button class="btn btn-sm btn-outline" onclick="App.state.currentCourse=App.getCourse(${c.id});App.go('course-detail')" style="margin-bottom:12px">&larr; Back to Overview</button>
          <h3 style="font-size:15px">${this.esc(c.title)}</h3>
          ${prog?`<div class="progress-text" style="margin-top:8px">${prog.progress}% complete</div><div class="progress-bar"><div class="fill" style="width:${prog.progress}%"></div></div>`:''}
        </div>
        ${modules.map((m,i)=>{
          const lessons=this.getLessons(m.id);
          return `<div class="module-group">
            <div class="module-title">Module ${i+1}: ${this.esc(m.title)}</div>
            ${lessons.map(l=>{
              const active=lesson&&lesson.id===l.id;
              const done=prog&&prog.lessonProgress[l.id];
              return `<div class="lesson-item ${active?'active':''} ${done?'completed':''}" onclick="App.state.currentLesson=DB.find('lessons',x=>x.id===${l.id});App.render()">
                <span class="check-icon">${done?'&#10003;':''}</span><span>${this.esc(l.title)}</span><span class="duration">${l.duration}m</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
        ${quizzes.map(q=>`<div class="module-group"><div class="lesson-item" onclick="App.startQuiz(${q.id})" style="padding:16px 24px">
          <span style="font-size:16px">${q.quiz_type==='final_exam'?'&#127942;':'&#128221;'}</span>
          <span style="font-weight:600">${this.esc(q.title)}</span>
        </div></div>`).join('')}
      </div>
      <div class="course-content">
        ${lesson?this.renderLessonContent(lesson):`<div class="empty-state"><h3>Select a lesson to begin</h3></div>`}
      </div></div>`;
  },

  renderLessonContent(l){
    const done = this.getProgress(this.state.currentCourse.id)?.lessonProgress[l.id];
    let h='';
    if(l.content_type==='youtube'&&l.youtube_url){
      h+=`<div class="video-container"><iframe src="https://www.youtube.com/embed/${this.ytId(l.youtube_url)}" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`;
    } else if(l.content_type==='video'&&l.video_url){
      h+=`<div class="video-container"><video controls src="${this.esc(l.video_url)}"></video></div>`;
    } else if(l.content_type==='social'&&l.social_url){
      h+=`<div class="social-embed"><p style="font-size:48px;margin-bottom:16px">&#128241;</p><p style="margin-bottom:16px">Visit our social media for the latest tips and updates</p><a href="${this.esc(l.social_url)}" target="_blank" rel="noopener">Open Link &#8594;</a></div>`;
    }
    if(l.content_type==='text'&&l.text_content) h+=`<div class="lesson-content-text">${l.text_content}</div>`;
    h+=`<div style="margin-bottom:24px"><h2 style="font-size:24px;margin-bottom:8px">${this.esc(l.title)}</h2><p style="color:var(--text-mid)">${this.esc(l.description)}</p></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:24px">
        ${!done?`<button class="btn btn-success" onclick="App.completeLesson(${l.id})">&#10003; Mark as Complete</button>`
        :`<span style="color:var(--success);font-weight:600;padding:12px 0">&#10003; Completed</span>`}
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('note-sec').hidden=!document.getElementById('note-sec').hidden">&#128221; Add Note</button>
      </div>
      <div id="note-sec" hidden style="margin-top:20px">
        <div class="card card-body"><h3 style="font-size:16px;margin-bottom:12px">Add a Note</h3>
        <textarea id="note-input" placeholder="Write your notes here..." style="margin-bottom:12px;min-height:100px"></textarea>
        <button class="btn btn-primary btn-sm" onclick="App.saveNote(document.getElementById('note-input').value,${l.id},${this.state.currentCourse.id})">Save Note</button></div>
      </div>`;
    return h;
  },

  // QUIZ
  renderQuizPage(){
    const q=this.state.currentQuiz; if(!q) return '';
    if(this.state.quizResults) return this.renderQuizResults();
    const questions = this.getQuestions(q.id);
    return `<div class="container" style="max-width:800px">
      <div class="quiz-header"><h2>${this.esc(q.title)}</h2>
        <p>${this.esc(q.description)} | Passing: ${q.passing_score}% | Attempt ${(q._attempts||0)+1}/${q.max_attempts||'&#8734;'}</p>
        ${q.time_limit?`<div style="margin-top:12px;font-size:18px;font-weight:700">&#9200; <span id="quiz-timer">${q.time_limit}:00</span></div>`:''}
      </div>
      <div class="quiz-body">
        ${questions.map((question,i)=>{
          const answers = this.getAnswers(question.id);
          const multi = question.type==='multi_select';
          return `<div style="margin-bottom:32px">
            <div class="q-text"><span class="q-number">${i+1}</span><span style="margin-top:4px">${this.esc(question.text)}</span></div>
            ${answers.map(a=>{
              const sel=(this.state.quizAnswers[question.id]||[]).includes(a.id);
              return `<div class="answer-option ${sel?'selected':''}" onclick="App.selectAnswer(${question.id},${a.id},${multi})">
                ${multi?`<span class="answer-checkbox">${sel?'&#10003;':''}</span>`:`<span class="answer-radio"></span>`}
                <span>${this.esc(a.text)}</span></div>`;
            }).join('')}
          </div>`;
        }).join('')}
        <div style="display:flex;gap:12px;justify-content:space-between;margin-top:16px">
          <button class="btn btn-outline" onclick="App.state.currentLesson=null;App.go('course-view')">Cancel</button>
          <button class="btn btn-primary btn-lg" onclick="App.submitQuiz()">Submit Answers</button>
        </div>
      </div></div>`;
  },

  renderQuizResults(){
    const q=this.state.currentQuiz, r=this.state.quizResults;
    const questions = this.getQuestions(q.id);
    return `<div class="container" style="max-width:800px">
      <div class="card" style="text-align:center;padding:48px 32px">
        <div class="results-score ${r.passed?'passed':'failed'}">${r.score}%</div>
        <h2 style="font-size:28px;margin-bottom:8px">${r.passed?'Congratulations!':'Keep Trying!'}</h2>
        <p style="color:var(--text-mid);margin-bottom:8px">You scored ${r.earnedPts} out of ${r.totalPts} points (${r.score}%)</p>
        <p style="color:var(--text-mid);margin-bottom:24px">Passing score: ${r.passing_score}%</p>
        ${r.passed&&q.quiz_type==='final_exam'?`<div style="background:rgba(34,197,94,0.1);border-radius:var(--radius);padding:20px;margin-bottom:24px">
          <p style="font-size:24px;margin-bottom:8px">&#127942;</p><p style="font-weight:600;color:var(--success)">You earned your Kru Academy Certificate!</p>
          <button class="btn btn-success" style="margin-top:12px" onclick="App.go('certificates')">View Certificate</button></div>`:''}
      </div>
      <h3 style="margin:24px 0 16px">Review Your Answers</h3>
      ${r.results.map((res,i)=>{
        const question = questions[i];
        const answers = this.getAnswers(question.id);
        return `<div class="card card-body" style="margin-bottom:12px">
          <div class="q-text"><span class="q-number" style="background:${res.correct?'var(--success)':'var(--danger)'}">${res.correct?'&#10003;':'&#10007;'}</span>
          <span style="margin-top:4px">${this.esc(question.text)}</span></div>
          ${answers.map(a=>{
            const isCor=res.correctAnswers.includes(a.id), wasSel=res.userAnswers.includes(a.id);
            return `<div class="answer-option ${isCor?'correct':wasSel?'incorrect':''}" style="cursor:default">${isCor?'&#10003;':wasSel?'&#10007;':'&nbsp;&nbsp;'}&nbsp;&nbsp;${this.esc(a.text)}</div>`;
          }).join('')}
          ${res.explanation?`<div class="explanation">${this.esc(res.explanation)}</div>`:''}
        </div>`;
      }).join('')}
      <div style="margin-top:24px;display:flex;gap:12px">
        <button class="btn btn-primary" onclick="App.state.currentLesson=null;App.go('course-view')">Back to Course</button>
        ${!r.passed?`<button class="btn btn-outline" onclick="App.startQuiz(${q.id})">Retry Quiz</button>`:''}
      </div></div>`;
  },

      <div><h4>Learn</h4><ul class="footer-links"><li><a href="#" onclick="event.preventDefault();App.go('get-started')">Become a PM</a></li><li><a href="#" onclick="event.preventDefault();App.go('courses')">All Courses</a></li><li><a href="#" onclick="event.preventDefault();App.go('resources')">Free Resources</a></li><li><a href="#" onclick="event.preventDefault();App.go(App.state.user?'dashboard':'register')">Get Started</a></li><li><a href="#" onclick="event.preventDefault();App.go('certificates')">Certificates</a></li></ul></div>
      <div><h4>Kru</h4><ul class="footer-links"><li><a href="https://mykru.ca" target="_blank">&#9889; Maintenance Platform</a></li><li><a href="https://mykru.ca" target="_blank">About Us</a></li><li><a href="https://mykru.ca" target="_blank">Contact</a></li><li><a href="#" onclick="event.preventDefault();App.showChatbotManual()">Find My Path</a></li></ul></div>
      <div><h4>Connect</h4><ul class="footer-links"><li><a href="https://www.facebook.com/mykru" target="_blank">Facebook</a></li><li><a href="https://www.instagram.com/mykru.ca/" target="_blank">Instagram</a></li><li><a href="https://www.linkedin.com/company/mykru" target="_blank">LinkedIn</a></li></ul></div>
    </div><div class="footer-bottom">&copy; ${new Date().getFullYear()} Kru Academy. A Kru company. All rights reserved.</div></footer>`;
  },

  // Close menus on outside click
  initClickHandler(){
    document.addEventListener('click', e => {
      if(this.state.showUserMenu && !e.target.closest('.user-avatar') && !e.target.closest('.user-dropdown')){
        this.state.showUserMenu = false; this.render();
      }
      if(this.state.showNotifPanel && !e.target.closest('.notif-panel') && !e.target.closest('.notif-btn')){
        this.state.showNotifPanel = false; this.render();
      }
    });
  },

  init(){
    this.initClickHandler();
    this.render();
    // Show chatbot for first-time visitors after a short delay
    if(!localStorage.getItem('kru_chatbot_seen')){
      setTimeout(()=>{ this.state.showChatbot = true; this.render(); }, 1500);
    }
  }
};

App.init();
</script>
